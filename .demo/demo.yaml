title: Reinhardt Demo
description: |
  Live-coding portion of the 15-minute Reinhardt full-stack demo. Scenes 1, 2, 10 are rendered separately as Manim animations (see ../source/manim.ipynb). The goal of this script is to show a Rust full-stack framework build — a REST API plus a WASM single-page frontend — in fifteen minutes.

  Target stack: `reinhardt-web@0.1.0-rc.20`. The rc.20 scaffold is used as-is; no manual scaffold fixes are needed. The urls/ directory layout (urls.rs + urls/{server_urls,client_urls,ws_urls}.rs) is the current default (kent8192/reinhardt-web#3917). The default-run = "manage" fix is included in rc.20 (kent8192/reinhardt-web#3925).
version: 2
timer: 15
demos:
  - title: 'Scene 3: Scaffold project + posts app + frontend (2:30–4:00)'
    description: Run startproject, add a posts app and a users app, tour the generated tree, then fill in local settings for Scene 5.
    steps:
      - action: executeTerminalCommand
        command: reinhardt-admin --version
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      - action: waitForTimeout
        timeout: 8000
      - action: executeTerminalCommand
        command: reinhardt-admin startproject fullstack_demo --with-pages
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      - action: waitForTimeout
        timeout: 11000
      - action: executeTerminalCommand
        command: cd fullstack_demo && reinhardt-admin startapp posts --with-pages
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      - action: waitForTimeout
        timeout: 15000
      - action: executeTerminalCommand
        command: reinhardt-admin startapp users --with-pages
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      - action: waitForTimeout
        timeout: 3000
      # Silently warm the cargo cache for `manage` in the background so that
      # Scene 5's `cargo run` returns within Demo Time's 5s shell-integration
      # wait window. The script detaches and returns immediately.
      - action: executeScript
        id: warmup
        command: bash
        path: .demo/scripts/warmup_cargo.sh
      - action: open
        path: fullstack_demo/src/apps/posts.rs
      - action: highlight
        path: fullstack_demo/src/apps/posts.rs
        startPlaceholder: '#[app_config'
        endPlaceholder: '"posts")]'
        highlightWholeLine: true
        zoom: 1.5
      - action: waitForTimeout
        timeout: 18000
      # Quick tour: the rc.20 urls scaffold is a directory (urls.rs + urls/{server_urls,client_urls,ws_urls}.rs).
      - action: open
        path: fullstack_demo/src/apps/posts/urls.rs
      - action: highlight
        path: fullstack_demo/src/apps/posts/urls.rs
        startPlaceholder: '#[cfg(server)]'
        endPlaceholder: 'pub mod ws_urls;'
        highlightWholeLine: true
        zoom: 1.4
      - action: waitForTimeout
        timeout: 12000
      - action: unselect
        path: fullstack_demo/src/apps/posts/urls.rs
      # Fill in local settings — matches the shape ProjectSettings expects in Scene 9.
      - action: open
        path: fullstack_demo/settings/local.toml
      - action: insert
        path: fullstack_demo/settings/local.toml
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          [core]
          secret_key = "local-dev-secret-change-in-production"
          debug = true

          [database]
          engine = "sqlite"
          name = "db.sqlite3"

          [auth]
          signing_key = "local-dev-token-secret"
      - action: save
        path: fullstack_demo/settings/local.toml
      - action: waitForTimeout
        timeout: 15000
  - title: 'Scene 4: Define User + Post models (4:00–5:30)'
    description: Define the User model first (needed as a FK target), then the Post model with an author FK referencing User. Add a domain method via an ordinary impl block.
    steps:
      - action: open
        path: fullstack_demo/src/apps/users/models.rs
      - action: insert
        path: fullstack_demo/src/apps/users/models.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use chrono::{DateTime, Utc};
          use reinhardt::prelude::*;
          use reinhardt::{Argon2Hasher, core::macros::user};
          use serde::{Deserialize, Serialize};

          #[user(hasher = Argon2Hasher, username_field = "email")]
          #[model(app_label = "users", table_name = "auth_user")]
          #[derive(Serialize, Deserialize)]
          pub struct User {
              #[field(primary_key = true)]
              pub id: i64,

              #[field(max_length = 150, unique = true)]
              pub username: String,

              #[field(max_length = 255, unique = true, email = true)]
              pub email: String,

              #[field(max_length = 255)]
              pub password_hash: Option<String>,

              #[field(default = true)]
              pub is_active: bool,

              #[field(default = false)]
              pub is_superuser: bool,

              #[field(include_in_new = false)]
              pub last_login: Option<DateTime<Utc>>,
          }
      - action: save
        path: fullstack_demo/src/apps/users/models.rs
      - action: waitForTimeout
        timeout: 10000
      - action: highlight
        path: fullstack_demo/src/apps/users/models.rs
        startPlaceholder: '#[user('
        endPlaceholder: 'pub last_login: Option<DateTime<Utc>>,'
        highlightWholeLine: true
        zoom: 1.3
      - action: waitForTimeout
        timeout: 10000
      - action: unselect
        path: fullstack_demo/src/apps/users/models.rs
      - action: open
        path: fullstack_demo/src/apps/posts/models.rs
      - action: insert
        path: fullstack_demo/src/apps/posts/models.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use chrono::{DateTime, Utc};
          use reinhardt::db::associations::ForeignKeyField;
          use reinhardt::prelude::*;
          use serde::{Deserialize, Serialize};

          use crate::apps::users::models::User;

          #[model(app_label = "posts", table_name = "posts")]
          #[derive(Serialize, Deserialize)]
          pub struct Post {
              #[field(primary_key = true)]
              pub id: i64,

              #[rel(foreign_key, on_delete = Cascade, related_name = "posts")]
              pub author: ForeignKeyField<User>,

              #[field(max_length = 200)]
              pub title: String,

              #[field(max_length = 10000)]
              pub body: String,

              #[field(default = false)]
              pub published: bool,

              #[field(auto_now_add = true)]
              pub created_at: DateTime<Utc>,
          }

          impl Post {
              /// Short preview of the post body (first 140 chars).
              pub fn summary(&self) -> String {
                  self.body.chars().take(140).collect()
              }
          }
      - action: save
        path: fullstack_demo/src/apps/posts/models.rs
      - action: waitForTimeout
        timeout: 25000
      - action: highlight
        path: fullstack_demo/src/apps/posts/models.rs
        startPlaceholder: '#[rel(foreign_key'
        endPlaceholder: 'pub author: ForeignKeyField<User>,'
        highlightWholeLine: true
        zoom: 1.4
      - action: waitForTimeout
        timeout: 15000
      - action: unselect
        path: fullstack_demo/src/apps/posts/models.rs
      - action: highlight
        path: fullstack_demo/src/apps/posts/models.rs
        startPlaceholder: 'impl Post {'
        endPlaceholder: 'self.body.chars().take(140).collect()'
        highlightWholeLine: true
        zoom: 1.3
      - action: waitForTimeout
        timeout: 15000
      - action: unselect
        path: fullstack_demo/src/apps/posts/models.rs
  - title: 'Scene 5: Migrations (5:30–6:30)'
    description: makemigrations → migrate → verify schema. SQLite keeps the loop fast and Docker-free.
    steps:
      - action: executeTerminalCommand
        command: '[ "$(basename "$PWD")" = "fullstack_demo" ] || cd fullstack_demo'
      - action: waitForTimeout
        timeout: 500
      - action: executeTerminalCommand
        command: cargo run --bin manage -- makemigrations posts --force-empty-state
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      # Cargo cache was pre-warmed in Scene 3 (.demo/scripts/warmup_cargo.sh),
      # so `cargo run --bin manage -- makemigrations` normally finishes within
      # Demo Time's internal 5s shell-integration wait. This extra buffer
      # covers slow disks or incidental cache invalidation.
      - action: waitForTimeout
        timeout: 20000
      - action: open
        path: fullstack_demo/migrations/posts/0001_initial.rs
      - action: highlight
        path: fullstack_demo/migrations/posts/0001_initial.rs
        startPlaceholder: CreateTable
        endPlaceholder: '}'
        highlightWholeLine: true
      - action: waitForTimeout
        timeout: 15000
      - action: executeTerminalCommand
        command: cargo run --bin manage -- migrate
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      # Incremental rebuild + migrate; short since cache is warm.
      - action: waitForTimeout
        timeout: 16000
  - title: 'Scene 6: Serializer + ViewSet (6:30–8:00)'
    description: Author PostSerializer with Validate, declare a ModelViewSet, and wire it into the project UnifiedRouter so GET /posts/ goes live.
    steps:
      - action: open
        path: fullstack_demo/src/apps/posts/serializers.rs
      - action: insert
        path: fullstack_demo/src/apps/posts/serializers.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use super::models::Post;
          use crate::shared::types::PostSerializer;

          impl From<Post> for PostSerializer {
              fn from(p: Post) -> Self {
                  Self {
                      id: p.id,
                      title: p.title,
                      body: p.body,
                      published: p.published,
                      created_at: p.created_at,
                  }
              }
          }
      - action: save
        path: fullstack_demo/src/apps/posts/serializers.rs
      - action: waitForTimeout
        timeout: 25000
      # Shared types cross the client/server boundary — declare the serializable DTOs once.
      - action: open
        path: fullstack_demo/src/shared/types.rs
      - action: insert
        path: fullstack_demo/src/shared/types.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use reinhardt::Validate;

          #[derive(Debug, Clone, Serialize, Deserialize, Validate)]
          pub struct PostSerializer {
              #[serde(skip_deserializing)]
              pub id: i64,

              #[validate(length(min = 1, max = 200, message = "title must be 1–200 chars"))]
              pub title: String,

              #[validate(length(min = 1, max = 10000, message = "body must be 1–10000 chars"))]
              pub body: String,

              pub published: bool,

              #[serde(skip_deserializing)]
              pub created_at: chrono::DateTime<chrono::Utc>,
          }

          #[derive(Debug, Clone, Serialize, Deserialize, Validate)]
          pub struct PublishInput {
              #[validate(range(min = 1, message = "id must be a positive integer"))]
              pub id: i64,
          }
      - action: save
        path: fullstack_demo/src/shared/types.rs
      - action: waitForTimeout
        timeout: 15000
      - action: open
        path: fullstack_demo/src/apps/posts/views.rs
      - action: insert
        path: fullstack_demo/src/apps/posts/views.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use reinhardt::prelude::*;
          use reinhardt::views::viewsets::{FilterConfig, OrderingConfig, PaginationConfig};
          use super::models::Post;
          use crate::shared::types::PostSerializer;

          pub fn viewset() -> ModelViewSet<Post, PostSerializer> {
              ModelViewSet::new("posts")
                  .with_pagination(PaginationConfig::page_number(10, Some(100)))
                  .with_filters(FilterConfig::new()
                      .with_filterable_fields(vec!["published".to_string(), "title".to_string()]))
                  .with_ordering(OrderingConfig::new()
                      .with_ordering_fields(vec!["created_at".to_string(), "title".to_string()]))
          }
      - action: save
        path: fullstack_demo/src/apps/posts/views.rs
      - action: waitForTimeout
        timeout: 35000
      - action: open
        path: fullstack_demo/src/config/urls.rs
      - action: insert
        path: fullstack_demo/src/config/urls.rs
        startPlaceholder: 'let router = '
        endPlaceholder: ';'
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: "    let router = UnifiedRouter::new()\n        .server(|r| r.viewset(\"/posts\", crate::apps::posts::views::viewset()));"
      - action: save
        path: fullstack_demo/src/config/urls.rs
      - action: waitForTimeout
        timeout: 15000
  - title: 'Scene 7: WASM frontend page (8:00–10:30)'
    description: |
      Write a typed server_fn RPC at the project root (cross-cfg so the WASM client can reach the generated HTTP stub), then build a page!-based WASM page that calls it via use_action.
    steps:
      # Expose a project-level server_fn module so the client can reach the generated stub.
      - action: open
        path: fullstack_demo/src/lib.rs
      - action: insert
        path: fullstack_demo/src/lib.rs
        startPlaceholder: 'pub mod shared;'
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |

          // Cross-cfg: server_fn stubs on WASM, impls on server
          pub mod server_fn;
      - action: save
        path: fullstack_demo/src/lib.rs
      - action: open
        path: fullstack_demo/src/server_fn.rs
      - action: insert
        path: fullstack_demo/src/server_fn.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          //! Server functions callable from both WASM (HTTP stubs) and server (impls).

          pub mod posts;
      - action: save
        path: fullstack_demo/src/server_fn.rs
      - action: open
        path: fullstack_demo/src/server_fn/posts.rs
      - action: insert
        path: fullstack_demo/src/server_fn/posts.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use reinhardt::pages::server_fn::{server_fn, ServerFnError};

          use crate::shared::types::{PostSerializer, PublishInput};

          #[server_fn]
          pub async fn list_posts(
              #[inject] db: reinhardt::DatabaseConnection,
          ) -> std::result::Result<Vec<PostSerializer>, ServerFnError> {
              use crate::apps::posts::models::Post;
              use reinhardt::Model;

              let rows: Vec<Post> = Post::objects()
                  .all()
                  .all_with_db(&db)
                  .await
                  .map_err(|e| ServerFnError::application(e.to_string()))?;
              Ok(rows
                  .into_iter()
                  .map(|p| PostSerializer {
                      id: p.id,
                      title: p.title,
                      body: p.body,
                      published: p.published,
                      created_at: p.created_at,
                  })
                  .collect())
          }
      - action: save
        path: fullstack_demo/src/server_fn/posts.rs
      - action: waitForTimeout
        timeout: 30000
      # Add the pages module to client.rs (2024 edition — no mod.rs).
      - action: open
        path: fullstack_demo/src/client.rs
      - action: insert
        path: fullstack_demo/src/client.rs
        startPlaceholder: 'mod state;'
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |

          pub mod pages;
      - action: save
        path: fullstack_demo/src/client.rs
      # Declare the page module, then write the page component itself.
      - action: open
        path: fullstack_demo/src/client/pages.rs
      - action: insert
        path: fullstack_demo/src/client/pages.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          //! Pages module — posts + other page components

          pub mod posts_page;
      - action: save
        path: fullstack_demo/src/client/pages.rs
      - action: open
        path: fullstack_demo/src/client/pages/posts_page.rs
      - action: insert
        path: fullstack_demo/src/client/pages/posts_page.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use reinhardt::pages::prelude::*;
          use crate::server_fn::posts::list_posts;
          use crate::shared::types::PostSerializer;

          pub fn posts_page() -> Page {
              let load_posts = use_action(|_: ()| async move {
                  list_posts().await.map_err(|e| e.to_string())
              });
              load_posts.dispatch(());
              let ls = load_posts.clone();

              page!(|ls: Action<Vec<PostSerializer>, String>| {
                  section {
                      class: "posts",
                      h1 { "Posts" }
                      {
                          Page::Fragment(ls.result().unwrap_or_default().iter()
                              .map(|p| page!(|title: String, body: String| {
                                  li {
                                      h2 { { title } }
                                      p { { body } }
                                  }
                              })(p.title.clone(), p.body.clone()))
                              .collect::<Vec<_>>())
                      }
                  }
              })(ls)
          }
      - action: save
        path: fullstack_demo/src/client/pages/posts_page.rs
      - action: waitForTimeout
        timeout: 30000
      - action: highlight
        path: fullstack_demo/src/client/pages/posts_page.rs
        startPlaceholder: 'page!(|ls:'
        endPlaceholder: '})(ls)'
        zoom: 1.4
      - action: waitForTimeout
        timeout: 25000
      - action: unselect
        path: fullstack_demo/src/client/pages/posts_page.rs
      # Wire the page into the client router.
      - action: open
        path: fullstack_demo/src/client/router.rs
      - action: insert
        path: fullstack_demo/src/client/router.rs
        startPlaceholder: 'Router::new()'
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |2

                  .route("/", super::pages::posts_page::posts_page)
      - action: save
        path: fullstack_demo/src/client/router.rs
      - action: waitForTimeout
        timeout: 5000
      - action: executeTerminalCommand
        command: '[ "$(basename "$PWD")" = "fullstack_demo" ] || cd fullstack_demo'
      - action: waitForTimeout
        timeout: 500
      - action: executeTerminalCommand
        command: cargo run --bin manage -- runserver
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      - action: waitForTimeout
        timeout: 25000
      - action: openWebsite
        url: http://127.0.0.1:8000/
      - action: waitForTimeout
        timeout: 15000
  - title: 'Scene 8: Admin UI (10:30–12:00)'
    description: Declare PostAdmin with the list_display shorthand, create a superuser, tour /admin/ in the browser.
    steps:
      - action: open
        path: fullstack_demo/src/apps/posts/admin.rs
      - action: insert
        path: fullstack_demo/src/apps/posts/admin.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use reinhardt::admin;
          use super::models::Post;

          #[admin(model, for = Post, name = "Post", list_display = [id, title, published, created_at])]
          pub struct PostAdmin;
      - action: save
        path: fullstack_demo/src/apps/posts/admin.rs
      - action: waitForTimeout
        timeout: 18000
      - action: executeTerminalCommand
        command: '[ "$(basename "$PWD")" = "fullstack_demo" ] || cd fullstack_demo'
      - action: waitForTimeout
        timeout: 500
      - action: executeTerminalCommand
        command: cargo run --bin manage -- createsuperuser
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
      - action: waitForTimeout
        timeout: 13000
      - action: openWebsite
        url: http://127.0.0.1:8000/admin/
      - action: waitForTimeout
        timeout: 45000
  - title: 'Scene 9: Auth settings + DI factory + server_fn (12:00–13:30)'
    description: |
      Compose AuthSettings into ProjectSettings via #[settings], register PostRepository via #[injectable_factory], then expose a publish_post #[server_fn] callable from both curl and the WASM frontend.
    steps:
      - action: open
        path: fullstack_demo/src/config/settings.rs
      - action: insert
        path: fullstack_demo/src/config/settings.rs
        startPlaceholder: 'use std::env;'
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |

          #[settings(fragment = true, section = "auth")]
          pub struct AuthSettings {
              pub signing_key: String,
          }
      - action: insert
        path: fullstack_demo/src/config/settings.rs
        startPlaceholder: '#[settings(core: CoreSettings)]'
        endPlaceholder: 'pub struct ProjectSettings;'
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          #[settings(core: CoreSettings, auth: AuthSettings)]
          pub struct ProjectSettings;
      - action: save
        path: fullstack_demo/src/config/settings.rs
      - action: waitForTimeout
        timeout: 18000
      - action: open
        path: fullstack_demo/src/apps/posts/repositories.rs
      - action: insert
        path: fullstack_demo/src/apps/posts/repositories.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |
          use reinhardt::prelude::*;
          use reinhardt::di::injectable_factory;
          use super::models::Post;

          pub struct PostRepository { pub db: DatabaseConnection }

          impl PostRepository {
              pub async fn get(&self, id: i64) -> Result<Post> {
                  Post::objects().get(id).all_with_db(&self.db).await?
                      .into_iter().next()
                      .ok_or_else(|| reinhardt::Error::NotFound("Post not found".to_string()))
              }
              pub async fn save(&self, post: &mut Post) -> Result<()> {
                  Post::objects().update(post).await.map(|_| ())
              }
          }

          #[injectable_factory]
          pub async fn post_repository(
              #[inject] db: DatabaseConnection,
          ) -> PostRepository {
              PostRepository { db }
          }
      - action: save
        path: fullstack_demo/src/apps/posts/repositories.rs
      - action: waitForTimeout
        timeout: 12000
      # PublishInput already lives in shared::types with Validate; reuse it directly.
      # Extend the project-level server_fn module with publish_post.
      - action: open
        path: fullstack_demo/src/server_fn/posts.rs
      - action: insert
        path: fullstack_demo/src/server_fn/posts.rs
        position: end
        insertTypingMode: character-by-character
        insertTypingSpeed: 1
        content: |

          #[server_fn]
          pub async fn publish_post(
              input: PublishInput,
              #[inject] db: reinhardt::DatabaseConnection,
          ) -> std::result::Result<PostSerializer, ServerFnError> {
              use crate::apps::posts::models::Post;
              use reinhardt::Model;

              let mut post = Post::objects()
                  .get(input.id)
                  .all_with_db(&db)
                  .await
                  .map_err(|e| ServerFnError::application(e.to_string()))?
                  .into_iter()
                  .next()
                  .ok_or_else(|| ServerFnError::application("Post not found".to_string()))?;
              post.published = true;
              Post::objects()
                  .update(&post)
                  .await
                  .map_err(|e| ServerFnError::application(e.to_string()))?;
              Ok(PostSerializer {
                  id: post.id,
                  title: post.title,
                  body: post.body,
                  published: post.published,
                  created_at: post.created_at,
              })
          }
      - action: save
        path: fullstack_demo/src/server_fn/posts.rs
      - action: waitForTimeout
        timeout: 25000
      - action: highlight
        path: fullstack_demo/src/server_fn/posts.rs
        startPlaceholder: '#[server_fn]'
        endPlaceholder: 'pub async fn publish_post('
        zoom: 1.6
      - action: waitForTimeout
        timeout: 12000
      - action: unselect
        path: fullstack_demo/src/server_fn/posts.rs
